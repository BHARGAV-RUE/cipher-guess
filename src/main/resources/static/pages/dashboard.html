<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard — CipherGuess</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>

<body>

    <!-- ── Navbar ── -->
    <div class="nav-bar">
        <p class="text-heading">CiPhErGuEsS</p>
        <div class="nav-right">
            <span class="nav-username">👾 <span id="nav-username">Player</span></span>
            <button class="btn-outline" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <!-- ── Dashboard ── -->
    <main class="dashboard-main">

        <!-- Welcome -->
        <div class="welcome-section">
            <p class="welcome-label">WELCOME BACK</p>
            <h1 class="welcome-name" id="welcome-username">Player</h1>
            <p class="welcome-sub">Ready to crack some numbers?</p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">🎮</span>
                <p class="stat-value" id="total-games">0</p>
                <p class="stat-label">Total Games</p>
            </div>
            <div class="stat-card stat-card--gold">
                <span class="stat-icon">🏆</span>
                <p class="stat-value" id="total-wins">0</p>
                <p class="stat-label">Total Wins</p>
            </div>
            <div class="stat-card">
                <span class="stat-icon">💀</span>
                <p class="stat-value" id="total-losses">0</p>
                <p class="stat-label">Total Losses</p>
            </div>
            <div class="stat-card">
                <span class="stat-icon">⚡</span>
                <p class="stat-value" id="best-score">—</p>
                <p class="stat-label">Best Score</p>
            </div>
            <div class="stat-card stat-card--wide">
                <span class="stat-icon">📈</span>
                <p class="stat-value" id="win-rate">0%</p>
                <p class="stat-label">Win Rate</p>
                <div class="win-rate-bar">
                    <div class="win-rate-fill" id="win-rate-bar"></div>
                </div>
            </div>
        </div>

        <!-- Game Select -->
        <div class="game-select-section">
            <p class="section-label">SELECT DIFFICULTY</p>
            <div class="difficulty-grid">
                <button class="diff-btn" data-diff="EASY" onclick="selectDifficulty('EASY')">
                    <span class="diff-range">1 — 10</span>
                    <span class="diff-name">EASY</span>
                    <span class="diff-desc">Warm up</span>
                </button>
                <button class="diff-btn" data-diff="MEDIUM" onclick="selectDifficulty('MEDIUM')">
                    <span class="diff-range">1 — 50</span>
                    <span class="diff-name">MEDIUM</span>
                    <span class="diff-desc">Getting hot</span>
                </button>
                <button class="diff-btn" data-diff="HARD" onclick="selectDifficulty('HARD')">
                    <span class="diff-range">1 — 100</span>
                    <span class="diff-name">HARD</span>
                    <span class="diff-desc">Real challenge</span>
                </button>
                <button class="diff-btn diff-btn--god" data-diff="GOD" onclick="selectDifficulty('GOD')">
                    <span class="diff-range">1 — 1000</span>
                    <span class="diff-name">GOD</span>
                    <span class="diff-desc">Are you serious?</span>
                </button>
            </div>
            <button class="btn-primary play-btn" id="play-btn" onclick="startGame()">
                CRACK IT
            </button>
        </div>

    </main>

    <script src="../scripts/authService.js"></script>
    <script src="../scripts/dashboard.js"></script>

</body>
</html>
