<!DOCTYPE html>
<html lang="en">

<head>
    <title>Play — CipherGuess</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/game.css">
</head>

<body>

    <!-- ── Navbar ── -->
    <div class="nav-bar">
        <p class="text-heading">CiPhErGuEsS</p>
        <div class="nav-right">
            <span class="nav-username">👾 <span id="nav-username">Player</span></span>
            <button class="btn-outline" onclick="goToDashboard()">DASHBOARD</button>
        </div>
    </div>

    <!-- ── Game Area ── -->
    <main class="game-main">

        <!-- Game Header -->
        <div class="game-header">
            <div class="game-info">
                <span class="game-difficulty" id="game-difficulty">EASY</span>
                <span class="game-range" id="game-range">1 — 10</span>
            </div>
            <div class="guess-counter">
                <span class="guess-label">GUESSES</span>
                <span class="guess-count" id="guess-count">0</span>
            </div>
        </div>

        <!-- Result Display -->
        <div class="result-display" id="result-display">
            <p class="result-text" id="result-text">ENTER YOUR GUESS</p>
        </div>

        <!-- Number Display -->
        <div class="number-display">
            <div class="number-slots" id="number-slots">
                <span class="number-slot">?</span>
            </div>
        </div>

        <!-- Guess History -->
        <div class="guess-history" id="guess-history"></div>

        <!-- Input Area -->
        <div class="input-area">
            <input
                class="guess-input"
                type="number"
                id="guess-input"
                placeholder="Type your number..."
                onkeydown="handleKeyDown(event)"
            >
            <button class="btn-primary guess-btn" onclick="submitGuess()">GUESS</button>
        </div>

        <!-- Forfeit -->
        <button class="forfeit-btn" onclick="forfeit()">FORFEIT</button>

    </main>

    <!-- ── Win Modal ── -->
    <div class="modal-overlay" id="win-modal">
        <div class="modal-box win-modal-box">
            <h2 class="modal-title win-title">CRACKED IT!</h2>
            <p class="win-number" id="win-number">7</p>
            <p class="win-message">You got it in <strong id="win-guesses">0</strong> guess(es)!</p>
            <div class="win-buttons">
                <button class="btn-primary" onclick="playAgain()">PLAY AGAIN</button>
                <button class="btn-outline" onclick="goToDashboard()">DASHBOARD</button>
            </div>
        </div>
    </div>

    <!-- ── Forfeit Modal ── -->
    <div class="modal-overlay" id="forfeit-modal">
        <div class="modal-box">
            <h2 class="modal-title">FORFEITED</h2>
            <p class="forfeit-message">The number was <strong id="forfeit-number" class="gold-text">?</strong></p>
            <div class="win-buttons">
                <button class="btn-primary" onclick="playAgain()">TRY AGAIN</button>
                <button class="btn-outline" onclick="goToDashboard()">DASHBOARD</button>
            </div>
        </div>
    </div>

    <script src="../scripts/authService.js"></script>
    <script src="../scripts/gameService.js"></script>
    <script src="../scripts/game.js"></script>

</body>
</html>
