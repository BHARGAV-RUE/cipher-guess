<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Crack The Number</title>
    <style>
        body {
            background-color: black;
            color: #FFD700;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 { margin-bottom: 10px; }

        .stats-container {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-card {
            border: 2px solid #FFD700;
            padding: 20px;
            width: 150px;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #FFA500;
        }

        .stat-card p {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
        }

        .play-button {
            padding: 15px 40px;
            background-color: #FFD700;
            color: black;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }

        .play-button:hover {
            background-color: #FFA500;
        }

        .logout-button {
            padding: 10px 20px;
            background-color: transparent;
            color: #FFD700;
            border: 2px solid #FFD700;
            cursor: pointer;
            font-size: 14px;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .logout-button:hover {
            background-color: #FFD700;
            color: black;
        }
    </style>
</head>
<body>

<button class="logout-button" onclick="logout()">Logout</button>

<h1>Crack The Number</h1>
<p>Welcome back, <span id="username-display">Player</span>!</p>

<div class="stats-container">
    <div class="stat-card">
        <h3>Total Games</h3>
        <p id="total-games">0</p>
    </div>
    <div class="stat-card">
        <h3>Total Wins</h3>
        <p id="total-wins">0</p>
    </div>
    <div class="stat-card">
        <h3>Total Losses</h3>
        <p id="total-losses">0</p>
    </div>
    <div class="stat-card">
        <h3>Best Score</h3>
        <p id="best-score">-</p>
    </div>
    <div class="stat-card">
        <h3>Win Rate</h3>
        <p id="win-rate">0%</p>
    </div>
</div>

<button class="play-button" onclick="playGame()">Play Game</button>

<script>
    const token = localStorage.getItem('token');

    // redirect to login if no token
    if(!token) {
        window.location.href = '/login.html';
    }

    // load stats when page opens
    async function loadStats() {
        const response = await fetch(`/game/stats?token=${token}`);
        const stats = await response.json();

        document.getElementById('total-games').innerText = stats.totalGames;
        document.getElementById('total-wins').innerText = stats.totalWins;
        document.getElementById('total-losses').innerText = stats.totalLosses;
        document.getElementById('best-score').innerText = stats.bestScore === 0 ? '-' : stats.bestScore;
        document.getElementById('win-rate').innerText = stats.winRate.toFixed(1) + '%';
    }

    async function logout() {
        await fetch(`/auth/logout?token=${token}`, { method: 'POST' });
        localStorage.removeItem('token');
        window.location.href = '/login.html';
    }

    function playGame() {
        window.location.href = '/game.html';
    }

    // run on page load
    loadStats();
</script>

</body>
</html>
